---
name: secrets_selector
type: selector
default: none
configurable: true
optional: false
freeze_on_deploy: false
unique: false
option_templates:
- name: none_option
  select_value: none
  named_manifests:
  - name: credhub_snippet
    manifest: |
      {}
  - name: vault_snippet
    manifest: |
      {}
- name: credhub_option
  select_value: credhub
  property_blueprints:
  - name: url
    type: string
    configurable: true
    optional: false
    freeze_on_deploy: false
    unique: false
  - name: client_id
    type: string
    configurable: true
    optional: false
    freeze_on_deploy: false
    unique: false
  - name: client_secret
    type: secret
    configurable: true
    optional: false
    freeze_on_deploy: false
    unique: false
  - name: ca_cert
    type: text
    configurable: true
    optional: true
    freeze_on_deploy: false
    unique: false
  - name: insecure_skip_verify
    type: boolean
    default: false
    configurable: true
    optional: false
    freeze_on_deploy: false
    unique: false
  - name: path_prefix
    type: string
    default: /concourse
    configurable: true
    optional: false
    freeze_on_deploy: false
    unique: false
  named_manifests:
  - name: credhub_snippet
    manifest: |
      url: (( .properties.secrets_selector.credhub_option.url.value ))
      path_prefix: (( .properties.secrets_selector.credhub_option.path_prefix.value ))
      client_id: (( .properties.secrets_selector.credhub_option.client_id.value ))
      client_secret: (( .properties.secrets_selector.credhub_option.client_secret.value ))
      tls:
        ca_cert: (( .properties.secrets_selector.credhub_option.ca_cert.value ))
        insecure_skip_verify: (( .properties.secrets_selector.credhub_option.insecure_skip_verify.value ))
  - name: vault_snippet
    manifest: |
      {}
- name: vault_option
  select_value: vault
  property_blueprints:
  - name: url
    type: string
    configurable: true
    optional: false
    freeze_on_deploy: false
    unique: false
  - name: client_token
    type: secret
    configurable: true
    optional: false
    freeze_on_deploy: false
    unique: false
  - name: namespace
    type: string
    configurable: true
    optional: true
    freeze_on_deploy: false
    unique: false
  - name: ca_cert
    type: text
    configurable: true
    optional: true
    freeze_on_deploy: false
    unique: false
  - name: insecure_skip_verify
    type: boolean
    default: false
    configurable: true
    optional: false
    freeze_on_deploy: false
    unique: false
  - name: path_prefix
    type: string
    default: /concourse
    configurable: true
    optional: false
    freeze_on_deploy: false
    unique: false
  named_manifests:
  - name: credhub_snippet
    manifest: |
      {}
  - name: vault_snippet
    manifest: |
      url: (( .properties.secrets_selector.vault_option.url.value ))
      path_prefix: (( .properties.secrets_selector.vault_option.path_prefix.value ))
      namespace: (( .properties.secrets_selector.vault_option.namespace.value ))
      tls:
        ca_cert: (( .properties.secrets_selector.vault_option.ca_cert.value ))
        insecure_skip_verify: (( .properties.secrets_selector.vault_option.insecure_skip_verify.value ))
      auth:
        client_token: (( .properties.secrets_selector.vault_option.client_token.value ))
