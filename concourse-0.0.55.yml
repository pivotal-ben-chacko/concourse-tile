---
name: concourse
product_version: 0.0.55
minimum_version_for_upgrade: 0.0.1
label: Concourse 7.9
rank: 1
metadata_version: 3.0.3
original_metadata_version: '1.8'
service_broker: false
opsmanager_syslog: false
icon_image: 
serial: true
variables:
- name: postgres_password
  type: password
- name: token_signing_key
  type: rsa
- name: tsa_host_key
  type: ssh
- name: worker_key
  type: ssh
releases:
- name: bpm
  version: 1.1.21
  file: bpm-1.1.21.tgz
- name: concourse
  version: 7.9.0
  file: concourse-7.9.0.tgz
- name: postgres
  version: '44'
  file: postgres-44.tgz
stemcell_criteria:
  os: ubuntu-jammy
  version: '1'
  enable_patch_security_updates: true
property_blueprints:
- name: credentials
  type: simple_credentials
  configurable: true
  optional: false
  freeze_on_deploy: false
  unique: false
- name: external_url
  type: string
  default: concourse.example.com
  configurable: true
  optional: false
  freeze_on_deploy: false
  unique: false
- name: tls_credentials
  type: rsa_cert_credentials
  configurable: true
  optional: false
  freeze_on_deploy: false
  unique: false
- name: auth_selector
  type: selector
  default: internal
  configurable: true
  optional: false
  freeze_on_deploy: false
  unique: false
  option_templates:
  - name: internal_option
    select_value: internal
    named_manifests:
    - name: ldap_auth_snippet
      manifest: |
        {}
    - name: main_team_auth_snippet
      manifest: |
        local:
          users:
          - (( .properties.credentials.identity ))
  - name: ldap_option
    select_value: ldap
    property_blueprints:
    - name: host
      type: string
      configurable: true
      optional: false
      freeze_on_deploy: false
      unique: false
    - name: display_name
      type: string
      default: LDAP
      configurable: true
      optional: true
      freeze_on_deploy: false
      unique: false
    - name: bind_dn
      type: string
      configurable: true
      optional: false
      freeze_on_deploy: false
      unique: false
    - name: bind_pw
      type: secret
      configurable: true
      optional: false
      freeze_on_deploy: false
      unique: false
    - name: insecure_no_ssl
      type: boolean
      default: false
      configurable: true
      optional: false
      freeze_on_deploy: false
      unique: false
    - name: insecure_skip_verify
      type: boolean
      default: false
      configurable: true
      optional: false
      freeze_on_deploy: false
      unique: false
    - name: start_tls
      type: boolean
      default: false
      configurable: true
      optional: false
      freeze_on_deploy: false
      unique: false
    - name: ca_cert
      type: text
      configurable: true
      optional: true
      freeze_on_deploy: false
      unique: false
    - name: user_search_base_dn
      type: string
      configurable: true
      optional: false
      freeze_on_deploy: false
      unique: false
    - name: user_search_filter
      type: string
      default: "(objectClass=inetOrgPerson)"
      configurable: true
      optional: true
      freeze_on_deploy: false
      unique: false
    - name: user_search_username
      type: string
      default: uid
      configurable: true
      optional: false
      freeze_on_deploy: false
      unique: false
    - name: user_search_id_attr
      type: string
      default: uid
      configurable: true
      optional: true
      freeze_on_deploy: false
      unique: false
    - name: user_search_email_attr
      type: string
      default: mail
      configurable: true
      optional: true
      freeze_on_deploy: false
      unique: false
    - name: user_search_name_attr
      type: string
      default: displayName
      configurable: true
      optional: true
      freeze_on_deploy: false
      unique: false
    - name: group_search_base_dn
      type: string
      configurable: true
      optional: true
      freeze_on_deploy: false
      unique: false
    - name: group_search_filter
      type: string
      configurable: true
      optional: true
      freeze_on_deploy: false
      unique: false
    - name: group_search_user_attr
      type: string
      configurable: true
      optional: true
      freeze_on_deploy: false
      unique: false
    - name: group_search_group_attr
      type: string
      configurable: true
      optional: true
      freeze_on_deploy: false
      unique: false
    - name: group_search_name_attr
      type: string
      configurable: true
      optional: true
      freeze_on_deploy: false
      unique: false
    - name: main_team_user
      type: string
      configurable: true
      optional: false
      freeze_on_deploy: false
      unique: false
    named_manifests:
    - name: ldap_auth_snippet
      manifest: |
        host: (( .properties.auth_selector.ldap_option.host.value ))
        display_name: (( .properties.auth_selector.ldap_option.display_name.value ))
        bind_dn: (( .properties.auth_selector.ldap_option.bind_dn.value ))
        bind_pw: (( .properties.auth_selector.ldap_option.bind_pw.value ))
        insecure_no_ssl: (( .properties.auth_selector.ldap_option.insecure_no_ssl.value ))
        insecure_skip_verify: (( .properties.auth_selector.ldap_option.insecure_skip_verify.value ))
        start_tls: (( .properties.auth_selector.ldap_option.start_tls.value ))
        ca_cert: (( .properties.auth_selector.ldap_option.ca_cert.value ))
        user_search_base_dn: (( .properties.auth_selector.ldap_option.user_search_base_dn.value ))
        user_search_filter: (( .properties.auth_selector.ldap_option.user_search_filter.value ))
        user_search_username: (( .properties.auth_selector.ldap_option.user_search_username.value ))
        user_search_id_attr: (( .properties.auth_selector.ldap_option.user_search_id_attr.value ))
        user_search_email_attr: (( .properties.auth_selector.ldap_option.user_search_email_attr.value ))
        user_search_name_attr: (( .properties.auth_selector.ldap_option.user_search_name_attr.value ))
        group_search_base_dn: (( .properties.auth_selector.ldap_option.group_search_base_dn.value ))
        group_search_filter: (( .properties.auth_selector.ldap_option.group_search_filter.value ))
        group_search_user_attr: (( .properties.auth_selector.ldap_option.group_search_user_attr.value ))
        group_search_group_attr: (( .properties.auth_selector.ldap_option.group_search_group_attr.value ))
        group_search_name_attr: (( .properties.auth_selector.ldap_option.group_search_name_attr.value ))
    - name: main_team_auth_snippet
      manifest: |
        ldap:
          users:
          - (( .properties.auth_selector.ldap_option.main_team_user.value ))
        local:
          users:
          - (( .properties.credentials.identity ))
form_types:
- property_inputs:
  - reference: ".properties.credentials"
    label: Local Concourse User
    description: Create local login user credentials
  - reference: ".properties.external_url"
    label: Web VM domain
    description: Enter external url for web UI
  - reference: ".properties.tls_credentials"
    label: TLS Certificate
    description: TLS Certificate
  - reference: ".properties.auth_selector"
    label: Authentication
    description: Choose between local user authentication and LDAP. Local users remain
      able to log in when LDAP is selected, and you can switch back to local-only
      authentication at any time.
    selector_property_inputs:
    - reference: ".properties.auth_selector.internal_option"
      label: Local user authentication
    - reference: ".properties.auth_selector.ldap_option"
      label: LDAP authentication
      property_inputs:
      - reference: ".properties.auth_selector.ldap_option.host"
        label: LDAP Server Host
        description: Host and optional port of the LDAP server, e.g. ldap.example.com:636.
          Do not include a scheme. If the port is omitted it defaults to 389, or 636
          when TLS is used.
      - reference: ".properties.auth_selector.ldap_option.display_name"
        label: Display Name
        description: Connector name shown on the Concourse login page.
      - reference: ".properties.auth_selector.ldap_option.bind_dn"
        label: Bind DN
        description: DN of the service account used to search for users, e.g. uid=admin,ou=Users,dc=example,dc=com.
      - reference: ".properties.auth_selector.ldap_option.bind_pw"
        label: Bind Password
        description: Password for the Bind DN service account.
      - reference: ".properties.auth_selector.ldap_option.insecure_no_ssl"
        label: Connect Without TLS
        description: Required when the LDAP host is not using TLS (typically port 389).
      - reference: ".properties.auth_selector.ldap_option.insecure_skip_verify"
        label: Skip TLS Certificate Verification
      - reference: ".properties.auth_selector.ldap_option.start_tls"
        label: Use StartTLS
        description: Connect on an insecure port and negotiate TLS via StartTLS.
      - reference: ".properties.auth_selector.ldap_option.ca_cert"
        label: CA Certificate
        description: PEM-encoded CA certificate used to verify the LDAP server certificate.
      - reference: ".properties.auth_selector.ldap_option.user_search_base_dn"
        label: User Search Base DN
        description: Base DN to search for users, e.g. ou=Users,dc=example,dc=com.
      - reference: ".properties.auth_selector.ldap_option.user_search_filter"
        label: User Search Filter
        description: Optional filter applied when searching for users, e.g. (objectClass=inetOrgPerson).
      - reference: ".properties.auth_selector.ldap_option.user_search_username"
        label: Username Attribute
        description: Attribute matched against the username entered at login, e.g.
          uid or sAMAccountName.
      - reference: ".properties.auth_selector.ldap_option.user_search_id_attr"
        label: User ID Attribute
      - reference: ".properties.auth_selector.ldap_option.user_search_email_attr"
        label: User Email Attribute
      - reference: ".properties.auth_selector.ldap_option.user_search_name_attr"
        label: User Display Name Attribute
      - reference: ".properties.auth_selector.ldap_option.group_search_base_dn"
        label: Group Search Base DN
        description: Base DN to search for groups, e.g. ou=Groups,dc=example,dc=com.
          Leave blank to disable group search.
      - reference: ".properties.auth_selector.ldap_option.group_search_filter"
        label: Group Search Filter
        description: Optional filter applied when searching for groups, e.g. (objectClass=groupOfNames).
      - reference: ".properties.auth_selector.ldap_option.group_search_user_attr"
        label: Group Search User Attribute
        description: User attribute matched against the group attribute, e.g. DN.
      - reference: ".properties.auth_selector.ldap_option.group_search_group_attr"
        label: Group Search Group Attribute
        description: Group attribute containing the user match, e.g. member.
      - reference: ".properties.auth_selector.ldap_option.group_search_name_attr"
        label: Group Name Attribute
        description: Group attribute used as the group name, e.g. cn.
      - reference: ".properties.auth_selector.ldap_option.main_team_user"
        label: Main Team LDAP User
        description: LDAP username granted access to the Concourse main team. Additional
          users and groups can be added later with fly set-team.
  name: settings
  label: Settings
  description: Edit Concourse Settings
job_types:
- name: web
  resource_label: web
  manifest: |
    add_local_users:
    - ((.properties.credentials.identity)):((.properties.credentials.password))
    external_url: (( .properties.external_url.value ))
    ldap_auth: (( .properties.auth_selector.selected_option.parsed_manifest(ldap_auth_snippet) ))
    main_team:
      auth: (( .properties.auth_selector.selected_option.parsed_manifest(main_team_auth_snippet) ))
    postgresql:
      database: atc
      role:
        name: concourse
        password: (((postgres_password)))
    tls:
      bind_port: 443
      cert:
        certificate: ((.properties.tls_credentials.cert_pem))
        private_key: ((.properties.tls_credentials.private_key_pem))
    token_signing_key: (((token_signing_key)))
    worker_gateway:
      authorized_keys: |
        (((worker_key.public_key)))
      host_key: (((tsa_host_key)))
  max_in_flight: 1
  single_az_only: false
  errand: false
  run_pre_delete_errand_default: true
  run_post_deploy_errand_default: true
  templates:
  - name: web
    release: concourse
  - name: bpm
    release: bpm
  instance_definition:
    default: 1
    configurable: true
  resource_definitions:
  - name: ram
    default: 512
    configurable: true
    constraints:
      min: 0
  - name: ephemeral_disk
    default: 4096
    configurable: true
    constraints:
      min: 4096
  - name: persistent_disk
    default: 0
    configurable: true
    constraints:
      min: 0
  - name: cpu
    default: 1
    configurable: true
    constraints:
      min: 1
  property_blueprints:
  - name: vm_credentials
    type: salted_credentials
    default:
      identity: vcap
    configurable: false
    optional: false
    freeze_on_deploy: false
    unique: false
- name: worker
  resource_label: worker
  manifest: |
    drain_timeout: 10m
    worker_gateway:
      worker_key: (((worker_key)))
  max_in_flight: 1
  single_az_only: false
  errand: false
  run_pre_delete_errand_default: true
  run_post_deploy_errand_default: true
  templates:
  - name: worker
    release: concourse
  instance_definition:
    default: 2
    configurable: true
  resource_definitions:
  - name: ram
    default: 512
    configurable: true
    constraints:
      min: 0
  - name: ephemeral_disk
    default: 4096
    configurable: true
    constraints:
      min: 4096
  - name: persistent_disk
    default: 0
    configurable: true
    constraints:
      min: 0
  - name: cpu
    default: 1
    configurable: true
    constraints:
      min: 1
  property_blueprints:
  - name: vm_credentials
    type: salted_credentials
    default:
      identity: vcap
    configurable: false
    optional: false
    freeze_on_deploy: false
    unique: false
- name: db
  resource_label: db
  manifest: |
    databases:
      databases:
      - name: atc
      port: 5432
      roles:
      - name: concourse
        password: (((postgres_password)))
  max_in_flight: 1
  single_az_only: false
  errand: false
  run_pre_delete_errand_default: true
  run_post_deploy_errand_default: true
  templates:
  - name: postgres
    release: postgres
  instance_definition:
    default: 1
    configurable: true
  resource_definitions:
  - name: ram
    default: 512
    configurable: true
    constraints:
      min: 0
  - name: ephemeral_disk
    default: 4096
    configurable: true
    constraints:
      min: 4096
  - name: persistent_disk
    default: 4096
    configurable: true
    constraints:
      min: 4096
  - name: cpu
    default: 1
    configurable: true
    constraints:
      min: 1
  property_blueprints:
  - name: vm_credentials
    type: salted_credentials
    default:
      identity: vcap
    configurable: false
    optional: false
    freeze_on_deploy: false
    unique: false
