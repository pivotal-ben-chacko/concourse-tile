---
name: secrets
label: Pipeline Secrets
description: Configure a credential manager for pipeline ((vars))
property_inputs:
- reference: ".properties.secrets_selector"
  label: Credential Manager
  description: Backend used to resolve ((var)) references in pipelines. Can be changed
    at any time; pipelines using ((vars)) will fail to resolve them until a backend
    is configured.
  selector_property_inputs:
  - reference: ".properties.secrets_selector.none_option"
    label: None
  - reference: ".properties.secrets_selector.colocated_option"
    label: Colocated CredHub (runs on the web VM)
  - reference: ".properties.secrets_selector.credhub_option"
    label: External CredHub
    property_inputs:
    - reference: ".properties.secrets_selector.credhub_option.url"
      label: CredHub Server URL
      description: e.g. https://credhub.example.com:8844
    - reference: ".properties.secrets_selector.credhub_option.client_id"
      label: UAA Client ID
      description: UAA client with credhub.read scope used to authenticate
    - reference: ".properties.secrets_selector.credhub_option.client_secret"
      label: UAA Client Secret
    - reference: ".properties.secrets_selector.credhub_option.ca_cert"
      label: CA Certificate
      description: PEM-encoded CA certificate used to verify the CredHub server certificate
    - reference: ".properties.secrets_selector.credhub_option.insecure_skip_verify"
      label: Skip TLS Certificate Verification
    - reference: ".properties.secrets_selector.credhub_option.path_prefix"
      label: Path Prefix
      description: Secrets are looked up under <prefix>/TEAM/PIPELINE/name then <prefix>/TEAM/name
  - reference: ".properties.secrets_selector.vault_option"
    label: Vault
    property_inputs:
    - reference: ".properties.secrets_selector.vault_option.url"
      label: Vault Server URL
      description: e.g. https://vault.example.com:8200
    - reference: ".properties.secrets_selector.vault_option.client_token"
      label: Client Token
      description: Periodic token used to authenticate with Vault
    - reference: ".properties.secrets_selector.vault_option.namespace"
      label: Vault Namespace
      description: Optional Vault Enterprise namespace
    - reference: ".properties.secrets_selector.vault_option.ca_cert"
      label: CA Certificate
      description: PEM-encoded CA certificate used to verify the Vault server certificate
    - reference: ".properties.secrets_selector.vault_option.insecure_skip_verify"
      label: Skip TLS Certificate Verification
    - reference: ".properties.secrets_selector.vault_option.path_prefix"
      label: Path Prefix
      description: Secrets are looked up under <prefix>/TEAM/PIPELINE/name then <prefix>/TEAM/name
