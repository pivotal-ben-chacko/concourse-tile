# Deletes the TKGI (pivotal-container-service) tile from Ops Manager, with
# verification that the destructive pre-delete errand actually ran and
# cleanup of any orphaned BOSH cloud config left behind.
#
# Runs on the official platform-automation image (om, bosh, credhub, python,
# CA certs all pre-baked), served from minio on the jumpbox
# (http://192.168.2.85:9100, bucket platform-automation). Tasks therefore
# need NO bootstrap - no apt, no tool downloads, no self-checks.
#
# Flow: write-env -> unstage -> full apply-changes (runs delete-all-clusters
# errand) -> verify-and-cleanup -> clean-library.
#
# DANGER: destroys every TKGI-managed Kubernetes cluster. No triggers, by
# design - run explicitly:
#   fly -t lab trigger-job -j delete-tkgi/delete-tkgi-tile --watch
#
# Secrets (colocated CredHub, team-level):
#   /concourse/main/opsman       json: target, username, password, skip_ssl_validation
#   /concourse/main/minio        json: access_key_id, secret_access_key
#   /concourse/main/git-ssh-key  ssh:  private_key

resources:
- name: platform-automation-tasks
  type: git
  icon: git
  source:
    uri: ubuntu@192.168.2.85:/home/ubuntu/git/platform-automation-tasks.git
    branch: main
    private_key: ((git-ssh-key.private_key))
- name: platform-automation-image
  type: s3
  icon: docker
  source:
    endpoint: http://192.168.2.85:9100
    bucket: platform-automation
    regexp: platform-automation-image-(.*).tgz
    access_key_id: ((minio.access_key_id))
    secret_access_key: ((minio.secret_access_key))

jobs:
- name: delete-tkgi-tile
  serial: true
  serial_groups: [opsman]
  plan:
  - in_parallel:
    - get: platform-automation-tasks
    - get: platform-automation-image
      params:
        unpack: true
  - task: write-env
    image: platform-automation-image
    config:
      platform: linux
      outputs:
      - name: env
      params:
        OM_TARGET: ((opsman.target))
        OM_USERNAME: ((opsman.username))
        OM_PASSWORD: ((opsman.password))
        OM_SKIP_SSL_VALIDATION: ((opsman.skip_ssl_validation))
      run:
        path: bash
        args:
        - -c
        - |
          set -eu
          {
            printf 'target: %s\n' "$OM_TARGET"
            printf 'username: %s\n' "$OM_USERNAME"
            printf 'password: %s\n' "$OM_PASSWORD"
            printf 'skip-ssl-validation: %s\n' "$OM_SKIP_SSL_VALIDATION"
            printf 'request-timeout: 1800\n'
          } > env/env.yml
  - task: unstage-tkgi
    image: platform-automation-image
    config:
      platform: linux
      inputs:
      - name: env
      outputs:
      - name: state
      run:
        path: bash
        args:
        - -c
        - |
          set -eu
          OM="om --env env/env.yml"
          if $OM staged-products | grep -q pivotal-container-service; then
            $OM unstage-product --product-name pivotal-container-service
            echo true > state/needs_deletion
          elif $OM deployed-products | grep -q pivotal-container-service; then
            echo "TKGI already staged for deletion from a prior run; completing it."
            echo true > state/needs_deletion
          else
            echo "pivotal-container-service not present - nothing to delete."
            echo false > state/needs_deletion
          fi
  - task: apply-changes
    timeout: 3h
    image: platform-automation-image
    config:
      platform: linux
      inputs:
      - name: platform-automation-tasks
      - name: env
      params:
        ENV_FILE: env.yml
        ERRAND_CONFIG_FILE: ""
        FORCE_LATEST_VARIABLES: "false"
        IGNORE_WARNINGS: "false"
        RECREATE: "false"
        SELECTIVE_DEPLOY_PRODUCTS: ""
      run:
        path: platform-automation-tasks/tasks/apply-changes.sh
  - task: verify-and-cleanup
    image: platform-automation-image
    config:
      platform: linux
      inputs:
      - name: env
      - name: state
      params:
        PRODUCT: pivotal-container-service
      run:
        path: bash
        args:
        - -c
        - |
          set -eu
          OM="om --env env/env.yml"

          if [ "$(cat state/needs_deletion)" != "true" ]; then
            echo "TKGI was not present to delete; skipping verification."
            exit 0
          fi

          # 1. deletion must have fully completed
          if $OM staged-products | grep -q "$PRODUCT" || \
             $OM deployed-products | grep -q "$PRODUCT"; then
            echo "ERROR: $PRODUCT still present after apply-changes - deletion incomplete."
            exit 1
          fi
          echo "OK: $PRODUCT is no longer staged or deployed."

          # 2. the pre-delete errand must have actually run (clusters/NSX cleanup)
          LATEST=$($OM curl -s -p /api/v0/installations | \
            python3 -c 'import json,sys; print(json.load(sys.stdin)["installations"][0]["id"])')
          echo "Checking installation $LATEST for the delete-all-clusters errand..."
          if $OM installation-log --id "$LATEST" | grep -q "run-errand delete-all-clusters"; then
            echo "OK: delete-all-clusters errand ran."
          else
            echo "ERROR: delete-all-clusters errand did NOT run in installation $LATEST."
            echo "Kubernetes clusters and NSX-T objects may be orphaned. Investigate before reusing."
            exit 1
          fi

          # 3. remove any BOSH cloud config the deletion left behind
          eval "$($OM bosh-env)"
          ORPHANS=$(bosh configs --type=cloud --json | python3 -c '
          import json,sys
          for r in json.load(sys.stdin)["Tables"][0]["Rows"]:
              if r["name"].startswith("pivotal-container-service"):
                  print(r["id"].rstrip("*"))')
          if [ -n "$ORPHANS" ]; then
            for id in $ORPHANS; do
              echo "Deleting orphaned cloud config $id"
              bosh -n delete-config "$id"
            done
          else
            echo "OK: no orphaned TKGI cloud configs remain."
          fi
  - task: clean-library
    image: platform-automation-image
    config:
      platform: linux
      inputs:
      - name: env
      run:
        path: bash
        args:
        - -c
        - |
          set -eu
          om --env env/env.yml delete-unused-products
          echo "Remaining staged products:"
          om --env env/env.yml staged-products
