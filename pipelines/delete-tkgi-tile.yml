# Deletes the TKGI (pivotal-container-service) tile from Ops Manager:
# unstages the product, then a FULL Apply Changes (deletions are only
# processed by a full apply), which runs TKGI's delete-all-clusters errand
# and removes the BOSH deployment. Library is cleaned afterwards.
#
# DANGER: destroys every TKGI-managed Kubernetes cluster. No triggers, by
# design — run explicitly:
#
#   fly -t lab trigger-job -j delete-tkgi/delete-tkgi-tile --watch
#
# Secrets (colocated CredHub, team-level):
#   /concourse/main/opsman       json: target, username, password, skip_ssl_validation
#   /concourse/main/git-ssh-key  ssh:  private_key
#
# Follows pipelines/CONVENTIONS.md (platform-automation task shape,
# serial_groups: [opsman], CredHub-only secrets).

resources:
- name: platform-automation-tasks
  type: git
  icon: git
  source:
    uri: ubuntu@192.168.2.85:/home/ubuntu/git/platform-automation-tasks.git
    branch: main
    private_key: ((git-ssh-key.private_key))
- name: om-cli
  type: github-release
  icon: github
  check_every: 24h
  source:
    owner: pivotal-cf
    repository: om
- name: task-image
  type: registry-image
  icon: docker
  check_every: 24h
  source:
    repository: ubuntu
    tag: noble

jobs:
- name: delete-tkgi-tile
  serial: true
  serial_groups: [opsman]
  plan:
  - in_parallel:
    - get: platform-automation-tasks
    - get: om-cli
      params:
        globs: [om-linux-amd64-*.tar.gz]
    - get: task-image
  - task: write-env
    image: task-image
    config:
      platform: linux
      outputs:
      - name: env
      params:
        OM_TARGET: ((opsman.target))
        OM_USERNAME: ((opsman.username))
        OM_PASSWORD: ((opsman.password))
        OM_SKIP_SSL_VALIDATION: ((opsman.skip_ssl_validation))
      run:
        path: bash
        args:
        - -c
        - |
          set -eu
          {
            printf 'target: %s\n' "$OM_TARGET"
            printf 'username: %s\n' "$OM_USERNAME"
            printf 'password: %s\n' "$OM_PASSWORD"
            printf 'skip-ssl-validation: %s\n' "$OM_SKIP_SSL_VALIDATION"
            printf 'request-timeout: 1800\n'
          } > env/env.yml
  - task: unstage-tkgi
    image: task-image
    config:
      platform: linux
      inputs:
      - name: env
      - name: om-cli
      run:
        path: bash
        args:
        - -c
        - |
          set -eu
          apt-get update -qq >/dev/null && apt-get install -y -qq ca-certificates >/dev/null
          tar -xzf om-cli/om-linux-amd64-*.tar.gz -C /usr/local/bin om
          if ! om --env env/env.yml staged-products | grep -q pivotal-container-service; then
            echo "pivotal-container-service is not staged - nothing to unstage."
            exit 0
          fi
          om --env env/env.yml unstage-product --product-name pivotal-container-service
  - task: apply-changes
    timeout: 3h
    image: task-image
    config:
      platform: linux
      inputs:
      - name: platform-automation-tasks
      - name: env
      - name: om-cli
      params:
        ENV_FILE: env.yml
        ERRAND_CONFIG_FILE: ""
        FORCE_LATEST_VARIABLES: "false"
        IGNORE_WARNINGS: "false"
        RECREATE: "false"
        SELECTIVE_DEPLOY_PRODUCTS: ""
      run:
        path: bash
        args:
        - -c
        - |
          set -eu
          apt-get update -qq >/dev/null && apt-get install -y -qq ca-certificates >/dev/null
          tar -xzf om-cli/om-linux-amd64-*.tar.gz -C /usr/local/bin om
          exec platform-automation-tasks/tasks/apply-changes.sh
  - task: clean-library
    image: task-image
    config:
      platform: linux
      inputs:
      - name: env
      - name: om-cli
      run:
        path: bash
        args:
        - -c
        - |
          set -eu
          apt-get update -qq >/dev/null && apt-get install -y -qq ca-certificates >/dev/null
          tar -xzf om-cli/om-linux-amd64-*.tar.gz -C /usr/local/bin om
          om --env env/env.yml delete-unused-products
          echo "Remaining staged products:"
          om --env env/env.yml staged-products
