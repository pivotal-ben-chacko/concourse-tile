resources:
- icon: docker
  name: platform-automation-image
  source:
    access_key_id: ((minio.access_key_id))
    bucket: platform-automation
    endpoint: http://192.168.2.85:9100
    regexp: platform-automation-image-(.*).tgz
    secret_access_key: ((minio.secret_access_key))
  type: s3
- icon: git
  name: platform-automation-tasks
  source:
    branch: main
    private_key: ((git-ssh-key.private_key))
    uri: ubuntu@192.168.2.85:/home/ubuntu/git/platform-automation-tasks.git
  type: git
- icon: file-cog
  name: tkgi-config
  source:
    branch: main
    private_key: ((git-ssh-key.private_key))
    uri: ubuntu@192.168.2.85:/home/ubuntu/git/tkgi-config.git
  type: git
