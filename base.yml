---
name: concourse
product_version: $( version )
minimum_version_for_upgrade: 0.0.1
label: Concourse 7.9
rank: 1
metadata_version: 3.0.3
original_metadata_version: '1.8'
service_broker: false
opsmanager_syslog: false
icon_image: $( icon )
serial: true
variables:
- name: postgres_password
  type: password
- name: token_signing_key
  type: rsa
- name: tsa_host_key
  type: ssh
- name: worker_key
  type: ssh
- name: uaa_db_password
  type: password
- name: uaa_users_admin
  type: password
- name: uaa_admin
  type: password
- name: uaa_login
  type: password
- name: uaa_jwt
  type: rsa
  options:
    key_length: 4096
- name: uaa_encryption_key
  type: password
- name: credhub_db_password
  type: password
- name: credhub_encryption_password
  type: password
  options:
    length: 40
- name: concourse_to_credhub_client_secret
  type: password
- name: credhub_admin_secret
  type: password
- name: internal_tls_ca
  type: certificate
  options:
    is_ca: true
    common_name: concourse-internal-ca
- name: uaa_ssl
  type: certificate
  options:
    ca: internal_tls_ca
    common_name: 127.0.0.1
    alternative_names:
    - 127.0.0.1
    - localhost
- name: credhub_tls
  type: certificate
  options:
    ca: internal_tls_ca
    common_name: 127.0.0.1
    alternative_names:
    - 127.0.0.1
    - localhost
releases:
- $( release "bpm" )
- $( release "concourse" )
- $( release "postgres" )
- $( release "uaa" )
- $( release "credhub" )
stemcell_criteria:
  os: ubuntu-jammy
  version: "1"
  enable_patch_security_updates: true
property_blueprints:
- $( property "credentials" )
- $( property "external_url" )
- $( property "tls_credentials" )
- $( property "auth_selector" )
- $( property "secrets_selector" )
- $( property "tagged_worker_tag" )
form_types:
- $( form "settings" )
- $( form "secrets" )
job_types:
- $( instance_group "db" )
- $( instance_group "web" )
- $( instance_group "worker" )
- $( instance_group "tagged_worker" )
